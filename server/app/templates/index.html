<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__SITE_TITLE__ — Library</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --bg-card:      #161b22;
      --bg-card-h:    #1c2128;
      --bg-input:     #0d1117;
      --bg-hdr:       rgba(13,17,23,.97);
      --border:       #30363d;
      --border-muted: #21262d;
      --text:         #e6edf3;
      --text-2:       #8b949e;
      --text-muted:   #6e7681;
      --accent:       #2f81f7;
      --accent-h:     #58a6ff;
      --green:        #3fb950;
      --red:          #f85149;
      --yellow:       #d29922;
      --radius:       8px;
      --shadow:       0 8px 28px rgba(0,0,0,.55);
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px; line-height: 1.5; min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-hdr); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 10px; padding: 10px 24px;
    }
    .logo {
      font-weight: 700; font-size: 16px; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; color: var(--text); flex-shrink: 0;
    }
    .logo-icon { font-size: 22px; }
    .search-wrap { flex: 1; min-width: 160px; max-width: 440px; position: relative; }
    .search-wrap input {
      width: 100%; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); padding: 7px 16px 7px 36px;
      font-size: 14px; outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(47,129,247,.15); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 14px; pointer-events: none;
    }
    .tab-group { display: flex; gap: 2px; }
    .tab-btn {
      background: none; border: none; cursor: pointer; color: var(--text-2);
      padding: 7px 14px; border-radius: var(--radius); font-size: 14px; font-weight: 500;
      transition: background .15s, color .15s; display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .tab-btn:hover  { background: var(--bg-card); color: var(--text); }
    .tab-btn.active { background: var(--bg-card); color: var(--text); }
    .tab-count {
      background: var(--border); color: var(--text-muted);
      border-radius: 10px; padding: 0 6px; font-size: 11px; font-weight: 600;
    }
    .tab-btn.active .tab-count { background: var(--accent); color: #fff; }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--text-2);
      padding: 7px; border-radius: var(--radius); font-size: 18px; line-height: 1;
      transition: color .15s; flex-shrink: 0;
    }
    .icon-btn:hover { color: var(--text); }
    .queue-btn { position: relative; }
    .queue-badge {
      position: absolute; top: 1px; right: 0;
      min-width: 16px; height: 16px; padding: 0 4px;
      border-radius: 999px; background: var(--accent); color: #fff;
      font-size: 10px; font-weight: 700; line-height: 16px; text-align: center;
    }
    .queue-badge.hidden { display: none; }
    .queue-btn.active { color: var(--text); background: var(--bg-card); }

    /* ── LAYOUT ── */
    #app {
      display: flex; max-width: 1440px; margin: 0 auto;
      padding: 28px 24px; gap: 28px; align-items: flex-start;
    }

    /* ── SIDEBAR ── */
    #sidebar { width: 168px; flex-shrink: 0; position: sticky; top: 76px; }
    .sidebar-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; padding-left: 10px;
    }
    .sys-link {
      display: flex; align-items: center; gap: 8px; padding: 5px 10px; border-radius: 6px;
      color: var(--text-2); font-size: 13px; cursor: pointer;
      transition: background .1s, color .1s; white-space: nowrap; overflow: hidden;
    }
    .sys-link:hover { background: var(--bg-card); color: var(--text); }
    .sys-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sys-link-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .sys-link-cnt  { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }

    /* ── CONTENT ── */
    #content { flex: 1; min-width: 0; }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex; background: var(--bg-card); border: 1px solid var(--border-muted);
      border-radius: var(--radius); margin-bottom: 28px; overflow: hidden;
    }
    .stat { padding: 14px 28px; text-align: center; flex: 1; border-right: 1px solid var(--border-muted); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 22px; font-weight: 700; color: var(--accent); }
    .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── SYSTEM SECTION ── */
    .sys-section { margin-bottom: 44px; scroll-margin-top: 72px; }
    .sys-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-muted);
    }
    .sys-header h2 { font-size: 16px; font-weight: 600; }
    .sys-count {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1px 9px; font-size: 11px; color: var(--text-2);
    }

    /* ── ROM CARD GRID ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .rom-card {
      background: var(--bg-card); border: 1px solid var(--border-muted);
      border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column;
      transition: border-color .15s, transform .12s, box-shadow .15s;
      position: relative;
    }
    .rom-card:hover { border-color: var(--border); transform: translateY(-2px); box-shadow: var(--shadow); }

    /* Top-right share icon — appears over the stripe, fades in on hover.
       Click bubbles to delegated 'copy' handler. Always visible on touch
       devices via @media query below. */
    .rom-share {
      position: absolute; top: 6px; right: 6px; z-index: 2;
      width: 24px; height: 24px; padding: 0;
      border: 1px solid var(--border-muted); border-radius: 6px;
      background: rgba(13, 17, 23, .78); color: var(--text-muted);
      font-size: 12px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s, color .15s, border-color .15s, background .15s;
    }
    .rom-card:hover .rom-share, .rom-share:focus-visible { opacity: 1; }
    .rom-share:hover { color: var(--accent); border-color: var(--accent); background: rgba(13, 17, 23, .95); }
    .rom-share.busy  { opacity: 1; color: var(--yellow); border-color: var(--yellow); }
    @media (hover: none) { .rom-share { opacity: .85; } }
    .rom-stripe { height: 3px; }
    .rom-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .rom-title {
      font-size: 13px; font-weight: 500; line-height: 1.4; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .rom-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .rom-size { font-size: 11px; color: var(--text-muted); }
    .save-dot {
      display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--green); margin-left: auto;
    }
    .save-dot::before { content:''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .rom-foot {
      padding: 8px 10px; border-top: 1px solid var(--border-muted);
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .rom-btns { display: flex; gap: 5px; margin-left: auto; flex-wrap: wrap; justify-content: flex-end; }
    /* 3DS cards can have up to 4 buttons — give them their own compact treatment */
    .rom-btns-3ds { gap: 4px; }
    .rom-btns-3ds .dl-btn { padding: 4px 7px; font-size: 10px; letter-spacing: .02em; }

    /* ── BADGE ── */
    .badge {
      display: inline-block; color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .dl-btn {
      border: none; border-radius: 6px; padding: 5px 10px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: background .15s, opacity .15s;
      white-space: nowrap; display: flex; align-items: center; gap: 3px;
      background: var(--accent); color: #fff;
    }
    .dl-btn:hover    { background: var(--accent-h); }
    .dl-btn:disabled { opacity: .45; cursor: not-allowed; }
    .dl-btn.busy     { background: var(--yellow) !important; color: #000 !important; border-color: var(--yellow) !important; }

    .dl-btn.extract {
      background: transparent; color: var(--green); border: 1px solid #2d6a4a;
    }
    .dl-btn.extract:hover:not(:disabled) { background: rgba(63,185,80,.1); border-color: var(--green); }

    /* Copy-link button: subtle outline so it doesn't compete with the primary download */
    .dl-btn.copy {
      background: transparent; color: var(--accent); border: 1px solid #30363d;
      padding: 5px 8px;
    }
    .dl-btn.copy:hover:not(:disabled) { background: rgba(88,166,255,.1); border-color: var(--accent); }
    .rom-btns-3ds .dl-btn.copy { padding: 4px 6px; }

    /* ── SAVES TABLE ── */
    .tbl-wrap { overflow-x: auto; border-radius: var(--radius); }
    table.tbl {
      width: 100%; border-collapse: collapse; background: var(--bg-card);
      border: 1px solid var(--border-muted); border-radius: var(--radius); overflow: hidden;
    }
    .tbl thead { background: rgba(0,0,0,.25); }
    .tbl th {
      text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    .tbl td { padding: 10px 16px; border-bottom: 1px solid var(--border-muted); vertical-align: middle; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:hover td { background: var(--bg-card-h); }
    .save-game { font-weight: 500; font-size: 13px; }
    .save-id   { font-size: 11px; color: var(--text-muted); font-family: ui-monospace, monospace; margin-top: 2px; }
    .save-date { font-size: 12px; color: var(--text-2); white-space: nowrap; }
    .save-size { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.72);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 360px; max-width: 92vw; box-shadow: var(--shadow);
    }
    .modal h2 { font-size: 17px; margin-bottom: 6px; }
    .modal p  { color: var(--text-2); font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .modal-sec-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
    .btn-ghost {
      background: none; color: var(--text-2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px 18px; font-size: 14px; cursor: pointer; transition: background .15s;
    }
    .btn-ghost:hover { background: var(--bg-card-h); color: var(--text); }
    .btn-ghost:disabled { opacity: .45; cursor: not-allowed; }

    /* ── DOWNLOAD QUEUE PANEL ── */
    .queue-panel {
      position: fixed; top: calc(var(--hdr-h, 56px) + 10px); right: 24px;
      width: 380px; max-width: calc(100vw - 24px); max-height: calc(100vh - var(--hdr-h, 56px) - 28px);
      overflow: auto; z-index: 180;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow); padding: 16px;
    }
    .queue-panel.hidden { display: none; }
    .queue-head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 14px;
    }
    .queue-title { font-size: 15px; font-weight: 700; }
    .queue-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .queue-head-actions { display: flex; align-items: center; gap: 8px; }
    .queue-section { margin-top: 14px; }
    .queue-section:first-child { margin-top: 0; }
    .queue-label {
      font-size: 11px; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
    }
    .queue-list { display: flex; flex-direction: column; gap: 8px; }
    .queue-item {
      border: 1px solid var(--border-muted); border-radius: 10px;
      padding: 10px 12px; background: rgba(255,255,255,.01);
    }
    .queue-item-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .queue-item-title {
      font-size: 13px; font-weight: 600; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .queue-item-meta {
      font-size: 11px; color: var(--text-muted); margin-top: 5px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .queue-item-status { font-size: 12px; color: var(--text-2); margin-top: 8px; }
    .queue-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .queue-item-actions { display: flex; align-items: center; gap: 6px; }
    .queue-mini-btn {
      background: none; color: var(--text-2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; font-size: 11px; cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
    }
    .queue-mini-btn:hover { background: var(--bg-card-h); color: var(--text); border-color: var(--border); }
    .queue-mini-btn.danger:hover { color: var(--red); border-color: var(--red); }
    .queue-empty {
      font-size: 12px; color: var(--text-muted); text-align: center;
      padding: 18px 12px; border: 1px dashed var(--border); border-radius: 10px;
    }
    .queue-state {
      border-radius: 999px; padding: 2px 8px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; white-space: nowrap;
      border: 1px solid transparent;
    }
    .queue-state.running { background: rgba(210,153,34,.16); color: var(--yellow); border-color: rgba(210,153,34,.4); }
    .queue-state.queued { background: rgba(47,129,247,.12); color: var(--accent-h); border-color: rgba(47,129,247,.35); }
    .queue-state.done { background: rgba(63,185,80,.12); color: var(--green); border-color: rgba(63,185,80,.35); }
    .queue-state.error { background: rgba(248,81,73,.12); color: var(--red); border-color: rgba(248,81,73,.35); }
    .queue-state.cancelled { background: rgba(139,148,158,.14); color: var(--text-2); border-color: rgba(139,148,158,.3); }
    .queue-progress { margin-top: 10px; }
    .queue-progress .prog-track { margin-bottom: 0; }

    .conv-fmt-badge {
      background: #1a3a2a; color: var(--green); border: 1px solid #2d6a4a;
      border-radius: 4px; padding: 1px 7px; font-size: 10px; font-weight: 700;
      text-transform: uppercase;
    }

    /* progress bar */
    .prog-track {
      height: 6px; background: var(--border-muted); border-radius: 3px; overflow: hidden; margin-bottom: 14px;
    }
    .prog-bar {
      height: 100%; border-radius: 3px; background: var(--green);
      width: 0%; transition: width .4s ease;
    }
    .prog-bar.indeterminate {
      width: 40%;
      animation: indeterminate 1.4s ease-in-out infinite;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(350%); }
    }

    /* ── SKELETON ── */
    .skeleton { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .6; } 50% { opacity: .2; } }
    .skel-head { height: 20px; width: 220px; background: var(--border-muted); border-radius: 4px; margin-bottom: 16px; }
    .skel-card { background: var(--bg-card); border: 1px solid var(--border-muted); border-radius: var(--radius); height: 140px; }

    /* ── SYSTEM OVERVIEW GRID (landing screen) ── */
    .sys-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .sys-tile {
      position: relative; display: flex; flex-direction: column;
      background: var(--bg-card); border: 1px solid var(--border-muted);
      border-radius: var(--radius); padding: 16px 16px 14px;
      cursor: pointer; overflow: hidden;
      transition: border-color .15s, transform .12s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .sys-tile:hover  { border-color: var(--border); transform: translateY(-2px); box-shadow: var(--shadow); }
    .sys-tile:active { transform: translateY(0); }
    .sys-tile-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .sys-tile-code  { font-size: 13px; font-weight: 700; letter-spacing: .04em; }
    .sys-tile-name  { font-size: 12px; color: var(--text-2); margin-top: 2px;
                      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sys-tile-foot  { display: flex; align-items: baseline; gap: 6px; margin-top: 14px; }
    .sys-tile-cnt   { font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1; }
    .sys-tile-lbl   { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── BACK BAR / CONTEXT HEADER ── */
    .ctx-bar {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border-muted);
    }
    .back-btn {
      background: var(--bg-card); border: 1px solid var(--border-muted); color: var(--text-2);
      border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;
      display: inline-flex; align-items: center; gap: 5px;
      transition: background .12s, color .12s, border-color .12s;
    }
    .back-btn:hover { background: var(--bg-card-h); color: var(--text); border-color: var(--border); }
    .ctx-title { display: flex; align-items: center; gap: 10px; }
    .ctx-title h2 { font-size: 17px; font-weight: 600; }
    .ctx-count {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 1px 9px; font-size: 11px; color: var(--text-2);
    }

    /* ── LOAD MORE SENTINEL ── */
    .load-more {
      padding: 22px; text-align: center; color: var(--text-muted); font-size: 12px;
    }
    .load-more.hidden { display: none; }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 72px 20px; color: var(--text-muted); }
    .empty-icon  { font-size: 48px; margin-bottom: 14px; line-height: 1; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
    .empty-sub   { font-size: 13px; max-width: 380px; margin: 0 auto; line-height: 1.6; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 9px; padding: 10px 22px; font-size: 13px;
      box-shadow: var(--shadow); z-index: 400;
      transition: opacity .25s, transform .25s;
      opacity: 0; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err  { border-color: var(--red);   color: var(--red);   }
    #toast.ok   { border-color: var(--green); color: var(--green); }

    /* ── SYSTEM CHIPS (mobile horizontal scroll bar) ── */
    #sys-chips { display: none; }
    .sys-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 13px; border-radius: 20px;
      border: 1px solid var(--border-muted);
      background: var(--bg-card); color: var(--text-2);
      font-size: 13px; font-weight: 600; white-space: nowrap;
      cursor: pointer; flex-shrink: 0;
      transition: background .12s, color .12s, border-color .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .sys-chip:hover  { background: var(--bg-card-h); color: var(--text); border-color: var(--border); }
    .sys-chip:active { transform: scale(.96); }
    .sys-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sys-chip-cnt { font-size: 11px; color: var(--text-muted); margin-left: 1px; }

    /* ── RESPONSIVE — tablet ── */
    @media (max-width: 900px) {
      #sidebar { display: none; }
      #sys-chips {
        display: flex; gap: 7px;
        overflow-x: auto; overflow-y: visible;
        /* Sticky just below the header — JS sets --hdr-h */
        position: sticky;
        top: var(--hdr-h, 56px);
        z-index: 90;
        background: var(--bg);

    /* ── RESPONSIVE — phone ── */
    @media (max-width: 600px) {
      header { padding: 8px 12px; gap: 8px; }

      /* Row 1: logo (left) + settings (right) */

      .rom-btns-3ds .dl-btn { padding: 4px 6px; font-size: 10px; min-height: 28px; }

      /* Saves table — hide less important columns */
      .tbl th:nth-child(3), .tbl td:nth-child(3) { display: none; } /* Size */
      .tbl th:nth-child(4), .tbl td:nth-child(4) { display: none; } /* Files */
      .save-date { font-size: 11px; }

      /* Modals full-width */
      .modal { width: 94vw; padding: 20px; }
      .queue-panel {
        right: 10px; left: 10px; width: auto;

    }
  </style>

<script>
// Injected server-side
const API_KEY  = '__API_KEY__';
const IS_ADMIN = __IS_ADMIN__;

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
// View model for the ROM side of the library:
//   view: 'overview'  -> system picker grid (landing screen, tiny payload)
//         'system'    -> one system's ROMs, lazy-rendered
//         'search'    -> server-side search results, grouped by system
//   stats           -> {SYS: count} — populated from /roms/systems
//   systemCache     -> {SYS: [rom, ...]} — per-system fetch cache so re-entry is instant
//   currentSystem   -> which system is being viewed (when view === 'system')
//   savedTitleIds   -> Set<title_id> — used to flag ROMs that have saves on server
//   searchResults   -> last search response payload
//   rendered        -> pointer used by the lazy-renderer in the current section
//   searchAbort     -> AbortController for the in-flight search request
const S = {
  view:          'overview',
  stats:         {},
  systemCache:   {},
  currentSystem: null,
  savedTitleIds: new Set(),
  saves:         [],
  searchResults: null,
  searchAbort:   null,
  tab:           'roms',
  q:             '',
  // Lazy render state — reused by both the system view and search view
  lazy: { items: [], rendered: 0, observer: null, containerId: null, renderFn: null },
};
const Q = { items: [], nextId: 1, activeId: null };
let _convAbort = null;  // AbortController for active queued conversion

// Lazy-render config: enough cards to fill a mobile viewport plus some headroom,
// but small enough that a single batch doesn't cause jank.
const LAZY_BATCH = 60;
// Hard ceiling on server-side search results shown to the UI. The server is
// fine with more, but 40k matches rendered all at once defeats the purpose.
const SEARCH_CAP = 400;

// ═══════════════════════════════════════════════════════
//  SYSTEM METADATA
// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
//  HTTP
// ═══════════════════════════════════════════════════════
async function api(path) {
  const r = await fetch(path, { headers: { 'X-API-Key': API_KEY } });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// Append the API key as a query param so a plain <a href> can authenticate.
// The auth middleware already accepts both X-API-Key header AND ?api_key=...
// (server/app/middleware/auth.py), so this is just a UX layer.
function withAuth(url) {
  return url + (url.includes('?') ? '&' : '?') + 'api_key=' + encodeURIComponent(API_KEY);
}

// Raw ROM / save downloads now use a native browser download instead of
// fetch().blob(). Reasons:
//   - fetch().blob() buffers the WHOLE response in browser RAM — fatal for
//     a 4 GB PS2 ISO on a phone.
//   - Native downloads stream straight to disk, show the browser's progress
//     bar, and survive backgrounding the tab on mobile.
//   - The browser issues HTTP Range automatically and can resume on
//     interruptions when the server advertises Accept-Ranges (we do).
// This means we can't show a per-button spinner during the transfer (the
// browser owns the UI now), but we briefly flash a "started" hint so the
// user knows the click registered.
function dlFile(url, filename, btn) {
  const a = document.createElement('a');
  a.href = withAuth(url);
  if (filename) a.download = filename;
  // Some mobile browsers ignore the download attribute on cross-origin /
  // proxied responses but still trigger a download because of the server's
  // Content-Disposition header — that's fine, the filename comes from there.
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  toast(`⬇ ${filename || 'Download started'}`, 'ok');

  // Brief visual ack on the clicked button.
  if (btn) {
    const origTxt = btn.textContent;
    btn.disabled = true; btn.classList.add('busy'); btn.textContent = '…';
    setTimeout(() => {
      btn.disabled = false; btn.classList.remove('busy');
      btn.textContent = origTxt || '↓';
    }, 900);
  }
}

// Copy a shareable absolute URL (with embedded api_key) to the clipboard.
// Only wired up on direct-download buttons — extract/conversion routes are
// excluded because they're not idempotent (depend on cache state) and
// produce streaming responses that don't survive cold link replays.
function copyLink(url, btn) {
  const full = location.origin + withAuth(url);
  const ok = () => {
    toast('🔗 Link copied', 'ok');
    if (btn) {
      const orig = btn.textContent;
      btn.classList.add('busy'); btn.textContent = '✓';
      setTimeout(() => { btn.classList.remove('busy'); btn.textContent = orig; }, 900);
    }
  };
  const fail = () => toast('Copy failed — link: ' + full, 'err');

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(full).then(ok, fail);
    return;
  }
  // Fallback for plain http:// (LAN deployments) where the async clipboard
  // API is gated behind a secure context.
  const ta = document.createElement('textarea');
  ta.value = full;
  ta.style.position = 'fixed'; ta.style.left = '-9999px'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    if (document.execCommand('copy')) ok(); else fail();
  } catch (e) { fail(); }
  document.body.removeChild(ta);
}

// Used by the extract queue (CHD → ISO etc) which DOES want the fetch()
// path so it can show "now converting" progress and stage messages while
// the server runs chdman / DolphinTool / etc. With the server now streaming
// the result from a temp file (instead of buffering), the browser side is
// the only thing still buffered — but extracts are typically <2 GB.
function triggerDownload(blob, filename) {
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob), download: filename,
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 15000);
}

// ═══════════════════════════════════════════════════════
//  DOWNLOAD QUEUE
// ═══════════════════════════════════════════════════════
// Stage messages per format
const STAGES = {
  cue: [
    'Starting conversion…',
    'Reading CHD header…',
    'Extracting tracks…',
    'Decoding audio and data…',
    'Writing output files…',
    'Packaging ZIP archive…',
  ],
  gdi: [

  ],
  iso: [

    'Writing ISO file…',
  ],
  cso: [
    'Starting conversion…',
    'Reading CHD header…',
    'Extracting UMD disc image…',
    'Writing ISO…',
    'Compressing to CSO…',
  ],
  rvz: [

  ],

    'Starting conversion…',
    'Opening 3DS cart image…',
    'Building decrypted CCI…',
    'Writing CCI file…',
  ],
};

// Labels and filename suffixes per format
const FMT_META = {
  cue: { badge:'CUE/BIN',       source:'CHD',     suffix:' · packaging as ZIP', ext:'.zip',  errHint:'Check that chdman is installed on the server.' },
  gdi: { badge:'GDI',           source:'CHD',     suffix:' · packaging as ZIP', ext:'.zip',  errHint:'Check that chdman is installed on the server.' },
  iso: { badge:'ISO',           source:'CHD',     suffix:'',                    ext:'.iso',  errHint:'Check that chdman is installed on the server.' },
  cso: { badge:'CSO',           source:'CHD',     suffix:' · compressing',      ext:'.cso',  errHint:'Check that chdman and ciso/maxcso are installed on the server.' },
  rvz: { badge:'ISO',           source:'RVZ',     suffix:'',                    ext:'.iso',  errHint:'Check that DolphinTool is installed on the server.' },
  cia:           { badge:'CIA',  source:'3DS CART', suffix:' · decrypted',   ext:'.cia',  errHint:'Configure SYNC_ROM_3DS_CIA_COMMAND on the server (see install-3ds-rom-tools-rpi.sh).' },
  decrypted_cci: { badge:'CCI',  source:'3DS CART', suffix:' · decrypted',   ext:'.cci',  errHint:'Configure SYNC_ROM_3DS_DECRYPTED_CCI_COMMAND on the server (see install-3ds-rom-tools-rpi.sh).' },
};

function queueKey(titleId, fmt) {
  return `${titleId}::${fmt}`;
}

function activeQueueItem() {
  return Q.items.find(item => item.id === Q.activeId) || null;
}

function buildExtractFilename(titleId, gameName, fmt) {
  // Fallback filename when the server didn't send Content-Disposition.
  // Preserves the game-name stem verbatim — the extension is the only
  // thing that changes between variants. Adding `_decrypted` or `_cue`-
  // style markers breaks client-side save detection, which keys off the
  // filename stem.
  const meta = FMT_META[fmt] || FMT_META.cue;
  const stem = gameName.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '_') || titleId;
  return `${stem}${meta.ext}`;
}

function parseContentDispositionFilename(header) {
  if (!header) return null;
  // RFC 5987 filename*=UTF-8''... takes precedence when present.
  const starMatch = header.match(/filename\*\s*=\s*(?:UTF-8|utf-8)''([^;]+)/i);
  if (starMatch) {
    try { return decodeURIComponent(starMatch[1]); } catch { /* fall through */ }
  }
  const quoted = header.match(/filename\s*=\s*"([^"]+)"/i);
  if (quoted) return quoted[1];
  const bare = header.match(/filename\s*=\s*([^;]+)/i);
  if (bare) return bare[1].trim();
  return null;
}

function toggleQueue(event) {
  event?.stopPropagation();
  const panel = qs('#queue-panel');
  if (panel.classList.contains('hidden')) openQueue();
  else closeQueue();
}

function openQueue() {
  qs('#queue-panel').classList.remove('hidden');
  qs('#queue-btn').classList.add('active');
}

function closeQueue() {
  qs('#queue-panel').classList.add('hidden');
  qs('#queue-btn').classList.remove('active');
}

function updateQueueBadge() {
  const badge = qs('#queue-badge');
  const count = Q.items.filter(item => item.status === 'queued' || item.status === 'running').length;
  badge.textContent = String(count);
  badge.classList.toggle('hidden', count === 0);
}

function trimQueueHistory() {
  const active = activeQueueItem();
  const queuedIds = new Set(Q.items.filter(item => item.status === 'queued').map(item => item.id));
  const finished = Q.items.filter(item => ['done', 'error', 'cancelled'].includes(item.status));
  const keepFinished = new Set(finished.slice(-8).map(item => item.id));
  Q.items = Q.items.filter(item =>
    item.id === active?.id || queuedIds.has(item.id) || keepFinished.has(item.id)
  );
}

function queueSummaryText() {
  const active = activeQueueItem();
  const pending = Q.items.filter(item => item.status === 'queued').length;
  if (active && pending) return `${active.gameName} is converting • ${pending} waiting`;
  if (active) return `${active.gameName} is converting`;
  if (pending) return `${pending} queued download${pending === 1 ? '' : 's'}`;
  return 'No active downloads';
}

function renderQueue() {
  updateQueueBadge();
  qs('#queue-summary').textContent = queueSummaryText();

  const active = activeQueueItem();
  const pending = Q.items.filter(item => item.status === 'queued');
  const recent = Q.items
    .filter(item => ['done', 'error', 'cancelled'].includes(item.status))
    .slice()
    .reverse();

  const sections = [];

  if (active) {
    const meta = FMT_META[active.fmt] || FMT_META.cue;
    sections.push(`
      <div class="queue-section">
        <div class="queue-label">Now converting</div>
        <div class="queue-item">
          <div class="queue-item-head">
            <div>
              <div class="queue-item-title">${esc(active.gameName)}</div>
              <div class="queue-item-meta">
                <span class="conv-fmt-badge">${meta.badge}</span>
                <span>${meta.source}${meta.suffix}</span>
              </div>
            </div>
            <div class="queue-item-actions">
              <span class="queue-state running">Running</span>
              <button class="queue-mini-btn danger" data-qaction="cancel" data-job-id="${active.id}">Cancel</button>
            </div>
          </div>
          <div class="queue-progress">
            <div class="prog-track">
              <div class="prog-bar indeterminate"></div>
            </div>
          </div>
          <div class="queue-item-status">${esc(active.stageText || 'Starting conversion…')}</div>
          <div class="queue-item-sub">${esc(active.subText || 'This may take a minute for large games')}</div>
        </div>
      </div>
    `);
  }

  if (pending.length) {
    sections.push(`
      <div class="queue-section">
        <div class="queue-label">Queued</div>
        <div class="queue-list">
          ${pending.map((item, idx) => `
            <div class="queue-item">
              <div class="queue-item-head">
                <div>
                  <div class="queue-item-title">${esc(item.gameName)}</div>
                  <div class="queue-item-meta">
                    <span class="conv-fmt-badge">${(FMT_META[item.fmt] || FMT_META.cue).badge}</span>
                    <span>#${idx + 1} in line</span>
                  </div>
                </div>
                <div class="queue-item-actions">
                  <span class="queue-state queued">Queued</span>
                  <button class="queue-mini-btn danger" data-qaction="remove" data-job-id="${item.id}">Remove</button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `);
  }

  if (recent.length) {
    sections.push(`
      <div class="queue-section">
        <div class="queue-label">Recent</div>
        <div class="queue-list">
          ${recent.map(item => {
            const state = item.status === 'done' ? 'Done'
                        : item.status === 'error' ? 'Failed'
                        : 'Cancelled';
            const detail = item.status === 'done'
              ? (item.filename || 'Download started')
              : (item.error || item.subText || '');
            return `
              <div class="queue-item">
                <div class="queue-item-head">
                  <div>
                    <div class="queue-item-title">${esc(item.gameName)}</div>
                    <div class="queue-item-meta">
                      <span class="conv-fmt-badge">${(FMT_META[item.fmt] || FMT_META.cue).badge}</span>
                    </div>
                  </div>
                  <span class="queue-state ${item.status}">${state}</span>
                </div>
                <div class="queue-item-status">${esc(item.stageText || state)}</div>
                ${detail ? `<div class="queue-item-sub">${esc(detail)}</div>` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `);
  }

  qs('#queue-body').innerHTML = sections.length
    ? sections.join('')
    : `<div class="queue-empty">ROM conversions run here in the background so you can keep browsing and queue more games.</div>`;
}

function enqueueExtract(titleId, gameName, fmt) {
  const key = queueKey(titleId, fmt);
  const duplicate = Q.items.find(item =>
    item.key === key && (item.status === 'queued' || item.status === 'running')
  );
  if (duplicate) {
    toast('That conversion is already queued', '');
    openQueue();
    return;
  }

  Q.items.push({
    id: Q.nextId++,
    key,
    titleId,
    gameName,
    fmt,
    status: 'queued',
    stageText: 'Waiting in queue…',
    subText: '',
    stageTimer: null,
    filename: '',
    error: '',
  });

  renderQueue();
  toast(`Queued ${gameName}`, 'ok');
  void runNextQueuedExtract();
}

function startQueueStages(job) {
  const stages = STAGES[job.fmt] || STAGES.cue;
  let stageIdx = 0;
  job.stageText = stages[stageIdx];
  job.subText = 'Multi-GB 3DS games can take 5–8 minutes the first time (cached after that)';
  // Tracks how long we've been on the LAST stage so we can append
  // "(still working… N s)" instead of letting the user think we're stuck.
  let lastStageEnteredAt = null;
  job.stageTimer = setInterval(() => {
    if (stageIdx < stages.length - 1) {
      stageIdx += 1;
      job.stageText = stages[stageIdx];
      if (stageIdx === stages.length - 1) lastStageEnteredAt = Date.now();
      renderQueue();
    } else if (lastStageEnteredAt != null) {
      // Once we've reached the final stage, every tick adds elapsed time
      // to the label so it's obvious the server is still working.  Stops
      // the user thinking the WebUI is stuck on "Writing CCI file…" when
      // really the converter is just slow on a Pi.
      const secs = Math.round((Date.now() - lastStageEnteredAt) / 1000);
      job.stageText = `${stages[stageIdx]} (server still working… ${secs}s)`;
      renderQueue();
    }
  }, 3200);
}

function stopQueueStages(job) {
  if (job?.stageTimer) {
    clearInterval(job.stageTimer);
    job.stageTimer = null;
  }
}

async function runNextQueuedExtract() {
  if (Q.activeId) return;

  const job = Q.items.find(item => item.status === 'queued');
  if (!job) {
    renderQueue();
    return;
  }

  Q.activeId = job.id;
  job.status = 'running';
  startQueueStages(job);
  renderQueue();

  _convAbort = new AbortController();

  try {
    // Two-phase strategy so multi-GB downloads don't OOM the browser:
    //
    //   Phase 1 — fetch() with the API key in a custom header so the server
    //             runs the conversion (or hits the cache) and returns the
    //             response headers including Content-Disposition. We DO NOT
    //             read the body — that's what was killing the WebUI on big
    //             3DS games (await r.blob() on a 3.5 GB CCI buffers the
    //             whole thing in browser memory and either OOMs the tab or
    //             stalls forever, depending on the platform).
    //
    //   Phase 2 — trigger an <a download href="…?api_key=…"> click. The
    //             browser handles the actual transfer with its native
    //             download manager: streams to disk, shows real progress,
    //             survives tab backgrounding, supports its own retry. The
    //             server side is a cache HIT (we just populated it during
    //             phase 1), so the conversion doesn't run twice.
    //
    // Net effect: same wall-clock time for the user, but reliability for
    // 1 GB+ downloads goes from "depends on phone RAM" to "browser
    // download manager handles it natively."
    const baseUrl = `/api/v1/roms/${encodeURIComponent(job.titleId)}?extract=${encodeURIComponent(job.fmt)}`;
    const r = await fetch(baseUrl, {
      headers: { 'X-API-Key': API_KEY },
      signal: _convAbort.signal,
    });

    if (!r.ok) {
      const txt = await r.text().catch(() => `HTTP ${r.status}`);
      throw new Error(txt || `HTTP ${r.status}`);
    }

    // Prefer the server's Content-Disposition filename so every client
    // (web, Android, Steam Deck, curl) lands on the same stem — important
    // for save-folder detection that keys off the filename.
    const filename = parseContentDispositionFilename(r.headers.get('Content-Disposition'))
                  || buildExtractFilename(job.titleId, job.gameName, job.fmt);

    // Phase-1 cleanup: explicitly cancel the in-flight body so the
    // browser stops buffering bytes we'll never read.  Without this the
    // network stack keeps draining the response in the background
    // (wasteful) until the GC eventually closes the Response.
    try { await r.body?.cancel(); } catch (_) { /* ignore */ }

    job.stageText = 'Streaming download to your device…';
    job.subText = 'Browser will save the file as it arrives';
    renderQueue();

    // Phase 2: hand off to the browser's native download manager.
    // The API key has to ride in the URL because <a href> can't carry
    // custom headers; the server's auth middleware accepts ?api_key=.
    const downloadUrl = `${baseUrl}&api_key=${encodeURIComponent(API_KEY)}`;
    const a = Object.assign(document.createElement('a'), {
      href: downloadUrl,
      download: filename,
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    job.filename = filename;
    job.status = 'done';
    job.stageText = 'Download started';
    job.subText = filename;
    toast(`⬇ ${filename}`, 'ok');
  } catch (e) {
    if (e.name === 'AbortError') {
      job.status = 'cancelled';
      job.stageText = 'Conversion cancelled';
      job.subText = '';
      toast('Conversion cancelled', '');
    } else {
      const meta = FMT_META[job.fmt] || FMT_META.cue;
      job.status = 'error';
      job.error = e.message;
      job.stageText = 'Conversion failed';
      job.subText = meta.errHint;
      toast('Conversion failed', 'err');
    }
  } finally {
    stopQueueStages(job);
    Q.activeId = null;
    _convAbort = null;
    trimQueueHistory();
    renderQueue();
    void runNextQueuedExtract();
  }
}

function cancelConvert(jobId) {
  const active = activeQueueItem();
  if (active && String(active.id) === String(jobId) && _convAbort) {
    _convAbort.abort();
  }
}

function removeQueuedJob(jobId) {
  Q.items = Q.items.filter(item => String(item.id) !== String(jobId) || item.status === 'running');
  trimQueueHistory();
  renderQueue();
}

function clearFinishedJobs() {
  Q.items = Q.items.filter(item => item.status === 'queued' || item.status === 'running');
  renderQueue();
}

// ═══════════════════════════════════════════════════════
//  LOAD — landing screen
//  Fetch the lightweight system overview + the saves list (saves total is
//  typically a few hundred, not thousands, so we can load it all). ROM *cards*
//  are not fetched until the user picks a system, searches, or opens the
//  Saves tab. This is the whole point of the rewrite: the 40k payload never
//  leaves the server during a cold load on mobile.
// ═══════════════════════════════════════════════════════
async function loadLanding() {
  showSkeletonTiles();
  try {
    const [ss, sd] = await Promise.all([
      api('/api/v1/roms/systems'),
      api('/api/v1/titles'),
    ]);
    S.stats         = ss.stats || {};
    S.saves         = sd.titles || [];
    S.savedTitleIds = new Set(S.saves.map(t => t.title_id));

    // Header tab counts
    const romTotal = Object.values(S.stats).reduce((n, v) => n + v, 0);
    qs('#cnt-roms').textContent  = romTotal;
    qs('#cnt-saves').textContent = S.saves.length;

    renderSystemNav();          // sidebar + mobile chips (used across all views)
    renderOverview();
    renderSaves();
  } catch(e) {
    qs('#roms-pane').innerHTML = emptyState('⚠️', 'Failed to load data', e.message);
  }
}

// ═══════════════════════════════════════════════════════
//  NAV — sidebar + mobile chips
//  Built once from the stats payload; click jumps into the system view.
// ═══════════════════════════════════════════════════════
function renderSystemNav() {
  const systems = Object.keys(S.stats).sort();
  const navHtml = systems.map(s =>
    `<div class="sys-link" data-action="nav-system" data-sys="${esc(s)}">
       <span class="sys-dot" style="background:${clr(s)}"></span>
       <span class="sys-link-name">${esc(s)}</span>
       <span class="sys-link-cnt">${S.stats[s]}</span>
     </div>`
  ).join('');
  qs('#sys-nav').innerHTML = navHtml;

  qs('#sys-chips').innerHTML = systems.map(s =>
    `<div class="sys-chip" data-action="nav-system" data-sys="${esc(s)}">
       <span class="sys-chip-dot" style="background:${clr(s)}"></span>
       ${esc(s)}
       <span class="sys-chip-cnt">${S.stats[s]}</span>
     </div>`
  ).join('');
}

// ═══════════════════════════════════════════════════════
//  VIEW — overview (landing screen)
//  A grid of system tiles. Tiny DOM (~30 tiles), instant on mobile.
// ═══════════════════════════════════════════════════════
function renderOverview() {
  disposeLazy();
  S.view = 'overview';
  S.currentSystem = null;

  const systems = Object.keys(S.stats).sort();
  if (!systems.length) {
    qs('#roms-pane').innerHTML = emptyState('📭', 'No ROMs available',
      'Set SYNC_ROM_DIR to point to your ROM library, then rescan from Settings.');
    return;
  }

  const total = systems.reduce((n, s) => n + S.stats[s], 0);
  let h = statsBar(total, 'ROMs', systems.length, 'Systems');
  h += '<div class="sys-grid">';
  for (const sys of systems) {
    h += `<div class="sys-tile" data-action="nav-system" data-sys="${esc(sys)}">
      <div class="sys-tile-stripe" style="background:${clr(sys)}"></div>
      <div class="sys-tile-code">${esc(sys)}</div>
      <div class="sys-tile-name" title="${esc(lbl(sys))}">${esc(lbl(sys))}</div>
      <div class="sys-tile-foot">
        <span class="sys-tile-cnt">${S.stats[sys]}</span>
        <span class="sys-tile-lbl">ROMs</span>
      </div>
    </div>`;
  }
  h += '</div>';
  qs('#roms-pane').innerHTML = h;
}

// ═══════════════════════════════════════════════════════
//  VIEW — single system (lazy-rendered)
//  Fetches all ROMs for ONE system (typically hundreds to a few thousand),
//  then streams cards into the DOM in LAZY_BATCH chunks via IntersectionObserver.
// ═══════════════════════════════════════════════════════
async function openSystem(sys) {
  sys = (sys || '').toUpperCase();
  if (!sys) return;

  disposeLazy();
  S.view = 'system';
  S.currentSystem = sys;

  // Jump to top so context-bar is visible on mobile after drill-down.
  window.scrollTo({ top: 0 });

  let roms = S.systemCache[sys];
  if (!roms) {
    qs('#roms-pane').innerHTML = skeletonSystem(sys);
    try {
      const d = await api(`/api/v1/roms?system=${encodeURIComponent(sys)}`);
      roms = d.roms || [];
      // Annotate save ownership once at fetch time.
      for (const r of roms) r.hasSave = S.savedTitleIds.has(r.title_id);
      S.systemCache[sys] = roms;
    } catch(e) {
      qs('#roms-pane').innerHTML = emptyState('⚠️', 'Failed to load ' + sys, e.message);
      return;
    }
  } else {
    // Refresh save flags (saves may have changed since cache fill).
    for (const r of roms) r.hasSave = S.savedTitleIds.has(r.title_id);
  }

  if (!roms.length) {
    qs('#roms-pane').innerHTML =
      contextBar(sys, 0) +
      emptyState('📭', 'No ROMs in ' + sys, 'The catalog has no entries for this system.');
    return;
  }

  // Shell: context bar + grid + load-more sentinel.
  qs('#roms-pane').innerHTML =
    contextBar(sys, roms.length) +
    `<div class="card-grid" id="lazy-grid"></div>
     <div class="load-more" id="lazy-sentinel">Loading more…</div>`;

  startLazy(roms, 'lazy-grid', 'lazy-sentinel', romCardHtml);
}

// ═══════════════════════════════════════════════════════
//  VIEW — search (server-side, cross-system)
//  Grouped by system; capped at SEARCH_CAP for sanity. User can open a
//  specific system from the results to see everything.
// ═══════════════════════════════════════════════════════
async function runSearch(q) {
  disposeLazy();
  S.view = 'search';
  S.currentSystem = null;

  // Cancel in-flight search if the user kept typing.
  if (S.searchAbort) S.searchAbort.abort();
  S.searchAbort = new AbortController();

  qs('#roms-pane').innerHTML = emptyState('🔍', `Searching "${esc(q)}"…`, '');

  let data;
  try {
    const r = await fetch(
      `/api/v1/roms?search=${encodeURIComponent(q)}&limit=${SEARCH_CAP}`,
      { headers: { 'X-API-Key': API_KEY }, signal: S.searchAbort.signal }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch(e) {
    if (e.name === 'AbortError') return;  // superseded by a newer search
    qs('#roms-pane').innerHTML = emptyState('⚠️', 'Search failed', e.message);
    return;
  } finally {
    S.searchAbort = null;
  }

  const roms = (data.roms || []).map(r => ({ ...r, hasSave: S.savedTitleIds.has(r.title_id) }));
  S.searchResults = { q, total: data.total, shown: roms.length, roms };

  if (!roms.length) {
    qs('#roms-pane').innerHTML =
      searchBar(q, 0, data.total) +
      emptyState('📭', `No ROMs match "${esc(q)}"`, 'Try a different search term.');
    return;
  }

  qs('#roms-pane').innerHTML =
    searchBar(q, roms.length, data.total) +
    `<div class="card-grid" id="lazy-grid"></div>
     <div class="load-more" id="lazy-sentinel">Loading more…</div>`;

  startLazy(roms, 'lazy-grid', 'lazy-sentinel', romCardHtml);
}

// ═══════════════════════════════════════════════════════
//  LAZY RENDERER
//  Appends cards in LAZY_BATCH chunks. An IntersectionObserver watches the
//  sentinel at the bottom of the list — when it enters the viewport, we
//  render the next chunk. This keeps initial render cost constant no matter
//  how many ROMs the system contains.
// ═══════════════════════════════════════════════════════
function startLazy(items, containerId, sentinelId, renderFn) {
  S.lazy.items = items;
  S.lazy.rendered = 0;
  S.lazy.containerId = containerId;
  S.lazy.renderFn = renderFn;

  renderNextBatch();

  const sentinel = document.getElementById(sentinelId);
  if (!sentinel) return;
  S.lazy.observer = new IntersectionObserver(entries => {
    if (entries.some(e => e.isIntersecting)) renderNextBatch();
  }, { rootMargin: '400px 0px' });  // start rendering before sentinel is actually visible
  S.lazy.observer.observe(sentinel);
}

function renderNextBatch() {
  const { items, rendered, containerId, renderFn } = S.lazy;
  const container = document.getElementById(containerId);
  if (!container) return;

  const end = Math.min(rendered + LAZY_BATCH, items.length);
  if (end <= rendered) return;

  // Build a DocumentFragment once, then append — single reflow per batch.
  const tmp = document.createElement('div');
  let h = '';
  for (let i = rendered; i < end; i++) h += renderFn(items[i]);
  tmp.innerHTML = h;
  const frag = document.createDocumentFragment();
  while (tmp.firstChild) frag.appendChild(tmp.firstChild);
  container.appendChild(frag);

  S.lazy.rendered = end;

  if (end >= items.length) {
    const s = document.getElementById('lazy-sentinel');
    if (s) s.classList.add('hidden');
    if (S.lazy.observer) { S.lazy.observer.disconnect(); S.lazy.observer = null; }
  }
}

function disposeLazy() {
  if (S.lazy.observer) { S.lazy.observer.disconnect(); S.lazy.observer = null; }
  S.lazy.items = [];
  S.lazy.rendered = 0;
  S.lazy.containerId = null;
  S.lazy.renderFn = null;
}

// ═══════════════════════════════════════════════════════
//  ROM CARD — HTML builder (same markup as before, now per-item)
// ═══════════════════════════════════════════════════════
function romCardHtml(rom) {
  const sys  = rom.system || 'UNKNOWN';
  const c    = clr(sys);
  const tid  = esc(rom.title_id);
  const fn   = esc(rom.filename || rom.title_id);
  const fmt  = rom.extract_format;
  const extractFormats = Array.isArray(rom.extract_formats) ? rom.extract_formats : [];
  const rawUrl = `/api/v1/roms/${encodeURIComponent(rom.title_id)}`;
  const rawLabel = (rom.filename?.split('.').pop() || 'ROM').toUpperCase();

  // Floating share icon — anchored top-right of the card via .rom-share.
  // Only points at the raw/direct download (rawUrl): ?extract= conversion
  // routes aren't stable shareable URLs (job-cached, streamed, slow).
  const shareIcon = `<button class="rom-share" data-action="copy"
        data-url="${rawUrl}" title="Copy share link to original ${rawLabel}"
        aria-label="Copy share link">🔗</button>`;

  let btnHtml;
  if (extractFormats.length && extractFormats.includes('iso') && extractFormats.includes('cso')) {
    // PSP: three options — ISO, CSO, CHD
    btnHtml = `<div class="rom-btns">
      <button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="iso"
        title="Extract to ISO">ISO</button>
      <button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="cso"
        title="Extract and compress to CSO">CSO</button>
      <button class="dl-btn" data-action="dl"
        data-url="${rawUrl}" data-fn="${fn}"
        title="Download original ${rawLabel}">${rawLabel}</button>
    </div>`;
  } else if (extractFormats.length === 1 && (extractFormats[0] === 'gdi' || extractFormats[0] === 'cue')) {
    const singleFmt = extractFormats[0];
    const label = singleFmt === 'gdi' ? 'GDI' : 'CUE/BIN';
    const tip   = singleFmt === 'gdi' ? 'GDI (Dreamcast) ZIP' : 'CUE/BIN ZIP';
    btnHtml = `<div class="rom-btns">
      <button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="${singleFmt}"
        title="Convert to ${tip}">${label}</button>
      <button class="dl-btn" data-action="dl"
        data-url="${rawUrl}" data-fn="${fn}"
        title="Download original ${rawLabel}">${rawLabel}</button>
    </div>`;
  } else if (extractFormats.length === 1 && extractFormats[0] === 'iso' && fmt === 'rvz') {
    btnHtml = `<div class="rom-btns">
      <button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="rvz"
        title="Convert RVZ to ISO">ISO</button>
      <button class="dl-btn" data-action="dl"
        data-url="${rawUrl}" data-fn="${fn}"
        title="Download original ${rawLabel}">${rawLabel}</button>
    </div>`;
  } else if (extractFormats.some(f => ['cia', 'decrypted_cci'].includes(f))) {
    const cartButtons = [];
    if (extractFormats.includes('cia')) {
      cartButtons.push(`<button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="cia"
        title="Convert to decrypted CIA (installable on CFW 3DS, works in emulators)">CIA</button>`);
    }
    if (extractFormats.includes('decrypted_cci')) {
      cartButtons.push(`<button class="dl-btn extract" data-action="extract"
        data-tid="${tid}" data-name="${esc(rom.name)}" data-fmt="decrypted_cci"
        title="Convert to decrypted CCI (for emulators)">CCI</button>`);
    }
    cartButtons.push(`<button class="dl-btn" data-action="dl"
        data-url="${rawUrl}" data-fn="${fn}"
        title="Download original ${rawLabel} cart image">3DS</button>`);
    btnHtml = `<div class="rom-btns rom-btns-3ds">${cartButtons.join('')}</div>`;
  } else {
    btnHtml = `<button class="dl-btn" data-action="dl"
      data-url="${rawUrl}" data-fn="${fn}">↓</button>`;
  }

  return `<div class="rom-card">
    ${shareIcon}
    <div class="rom-stripe" style="background:${c}"></div>
    <div class="rom-body">
      <div class="rom-title" title="${esc(rom.name)}">${esc(rom.name)}</div>
      <div class="rom-meta">
        <span class="rom-size">${fmtB(rom.size)}</span>
        ${rom.hasSave ? `<span class="save-dot">save</span>` : ''}
      </div>
    </div>
    <div class="rom-foot">
      <span class="badge" style="background:${c}; font-size:9px">${esc(sys)}</span>
      ${btnHtml}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  CONTEXT-BAR HELPERS (back button + header for drill-down views)
// ═══════════════════════════════════════════════════════
function contextBar(sys, count) {
  const c = clr(sys);
  return `<div class="ctx-bar">
    <button class="back-btn" data-action="nav-overview" title="Back to systems">← Systems</button>
    <div class="ctx-title">
      <span class="badge" style="background:${c}">${esc(sys)}</span>
      <h2>${esc(lbl(sys))}</h2>
      <span class="ctx-count">${count}</span>
    </div>
  </div>`;
}

function searchBar(q, shown, total) {
  const capped = total > shown ? ` (showing first ${shown} — narrow your search for more)` : '';
  return `<div class="ctx-bar">
    <button class="back-btn" data-action="nav-overview" title="Clear search">← Systems</button>
    <div class="ctx-title">
      <h2>Search: "${esc(q)}"</h2>
      <span class="ctx-count">${total} match${total === 1 ? '' : 'es'}${capped}</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
//  RENDER — Saves (unchanged layout; the saves list is small)
// ═══════════════════════════════════════════════════════
function renderSaves() {
  const q = S.q;
  const groups = {};
  for (const sv of S.saves) {
    const nm = sv.game_name || sv.name || sv.title_id;
    if (q && !nm.toLowerCase().includes(q) && !sv.title_id?.toLowerCase().includes(q)) continue;
    const p = sv.console_type || sv.platform || 'UNKNOWN';
    (groups[p] = groups[p] || []).push(sv);
  }
  const plats = Object.keys(groups).sort();

  if (!plats.length) {
    qs('#saves-pane').innerHTML = emptyState('💾',
      q ? `No saves match "${esc(q)}"` : 'No saves on server yet',
      q ? 'Try a different search term.' : 'Upload a save from your device to see it here.');
    return;
  }

  const total = plats.reduce((n, p) => n + groups[p].length, 0);
  let h = statsBar(total, 'Saves', plats.length, 'Platforms');

  for (const plat of plats) {
    const c = clr(plat);
    h += `<div class="sys-section" id="sp-${plat}">
      <div class="sys-header">
        <span class="badge" style="background:${c}">${esc(plat)}</span>
        <h2>${esc(lbl(plat))}</h2>
        <span class="sys-count">${groups[plat].length}</span>
      </div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr>
          <th>Game</th><th>Last Sync</th><th>Size</th><th>Files</th><th></th>
        </tr></thead><tbody>`;

    for (const sv of groups[plat]) {
      const nm  = sv.game_name || sv.name || sv.title_id;
      const fn  = esc(sv.title_id + '.bin');
      const url = `/api/v1/saves/${encodeURIComponent(sv.title_id)}`;
      h += `<tr>
        <td>
          <div class="save-game">${esc(nm)}</div>
          <div class="save-id">${esc(sv.title_id)}</div>
        </td>
        <td><div class="save-date">${fmtD(sv.last_sync || sv.server_timestamp)}</div></td>
        <td><div class="save-size">${fmtB(sv.save_size)}</div></td>
        <td><div class="save-size">${sv.file_count ?? '—'}</div></td>
        <td style="white-space:nowrap">
          <button class="dl-btn" data-action="dl" data-url="${esc(url)}" data-fn="${fn}">↓</button>
          <button class="dl-btn copy" data-action="copy" data-url="${esc(url)}" title="Copy share link">🔗</button>
        </td>
      </tr>`;
    }
    h += `</tbody></table></div></div>`;
  }
  qs('#saves-pane').innerHTML = h;
}

// ═══════════════════════════════════════════════════════
//  TABS
// ═══════════════════════════════════════════════════════
function switchTab(tab) {
  S.tab = tab;
  qs('#roms-pane').style.display  = tab === 'roms'  ? '' : 'none';
  qs('#saves-pane').style.display = tab === 'saves' ? '' : 'none';
  qs('#tab-roms').className  = 'tab-btn' + (tab === 'roms'  ? ' active' : '');
  qs('#tab-saves').className = 'tab-btn' + (tab === 'saves' ? ' active' : '');
  qs('#sbl').textContent = tab === 'roms' ? 'Systems' : 'Platforms';

  if (tab === 'saves') {
    // Rebuild nav from the actual saves we have (platforms, not ROM systems).
    const groups = {};
    for (const sv of S.saves) {
      const nm = sv.game_name || sv.name || sv.title_id;
      if (S.q && !nm.toLowerCase().includes(S.q) && !sv.title_id?.toLowerCase().includes(S.q)) continue;
      const p = sv.console_type || sv.platform || 'UNKNOWN';
      (groups[p] = groups[p] || []).push(sv);
    }
    const plats = Object.keys(groups).sort();
    qs('#sys-nav').innerHTML = plats.map(p =>
      `<div class="sys-link" onclick="jump('sp-${p}')">
         <span class="sys-dot" style="background:${clr(p)}"></span>
         <span class="sys-link-name">${esc(p)}</span>
         <span class="sys-link-cnt">${groups[p].length}</span>
       </div>`
    ).join('');
    qs('#sys-chips').innerHTML = plats.map(p =>
      `<div class="sys-chip" onclick="jump('sp-${p}')">
         <span class="sys-chip-dot" style="background:${clr(p)}"></span>
         ${esc(p)}
         <span class="sys-chip-cnt">${groups[p].length}</span>
       </div>`
    ).join('');
    renderSaves();
  } else {
    // Back on the ROMs tab — restore the system nav from stats.
    renderSystemNav();
    // Re-render current ROM view (overview / system / search).
    if (S.view === 'system' && S.currentSystem) openSystem(S.currentSystem);
    else if (S.view === 'search' && S.q)         runSearch(S.q);
    else                                          renderOverview();
  }
}

// ═══════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════
function openCfg()  { if (IS_ADMIN) qs('#cfg-modal').classList.remove('hidden'); }
function closeCfg() { qs('#cfg-modal').classList.add('hidden'); }

async function scanRoms(btn) {
  btn.disabled = true; btn.textContent = '⏳ Scanning…';
  try {
    const d = await api('/api/v1/roms/scan');
    toast(`Scan complete — ${d.count} ROMs found`, 'ok');
    closeCfg();
    // Invalidate per-system caches — a rescan may have added/removed ROMs.
    S.systemCache = {};
    loadLanding();
  } catch(e) { toast('Scan failed: ' + e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = '🔄 Rescan ROM directory'; }
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const qs   = sel => document.querySelector(sel);
const show = id  => document.getElementById(id).classList.remove('hidden');
const hide = id  => document.getElementById(id).classList.add('hidden');
const sleep = ms => new Promise(r => setTimeout(r, ms));

function statsBar(v1, l1, v2, l2) {
  return `<div class="stats-bar">
    <div class="stat"><div class="stat-val">${v1}</div><div class="stat-lbl">${l1}</div></div>
    <div class="stat"><div class="stat-val">${v2}</div><div class="stat-lbl">${l2}</div></div>
  </div>`;
}
function emptyState(icon, title, sub) {
  return `<div class="empty">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}
function fmtB(b) {
  if (!b) return '';
  if (b < 1024)    return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(0) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fmtD(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString(undefined, {month:'short', day:'numeric', year:'numeric'}); }
  catch { return iso; }
}
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function jump(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
}

let _tt;
function toast(msg, type='') {
  const el = qs('#toast');
  el.textContent = msg; el.className = 'show' + (type ? ' '+type : '');
  clearTimeout(_tt); _tt = setTimeout(() => { el.className = ''; }, 3400);
}
function showSkeleton() {
  const c = Array.from({length:16}, () => `<div class="skel-card skeleton"></div>`).join('');
  qs('#roms-pane').innerHTML =
    `<div class="skel-head skeleton" style="margin-bottom:24px"></div>
     <div class="card-grid">${c}</div>`;
}
// Tile-shaped skeleton for the landing (system picker) screen.
function showSkeletonTiles() {
  const t = Array.from({length:12}, () =>
    `<div class="sys-tile skeleton" style="height:92px"></div>`
  ).join('');
  qs('#roms-pane').innerHTML = `<div class="sys-grid">${t}</div>`;
}
// Slim skeleton inside a system view while the per-system fetch is in flight.
function skeletonSystem(sys) {
  const c = Array.from({length:12}, () => `<div class="skel-card skeleton"></div>`).join('');
  return contextBar(sys, '…') + `<div class="card-grid">${c}</div>`;
}

// ── EVENT DELEGATION ─────────────────────────────────────
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, url, fn, tid, name, fmt, sys } = btn.dataset;
  if (action === 'dl')           dlFile(url, fn, btn);
  if (action === 'copy')         copyLink(url, btn);
  if (action === 'extract')      enqueueExtract(tid, name, fmt);
  if (action === 'nav-system')   { qs('#search').value = ''; S.q = ''; openSystem(sys); }
  if (action === 'nav-overview') { qs('#search').value = ''; S.q = ''; renderOverview(); }
});

// ── QUEUE ACTIONS / OUTSIDE CLOSE ────────────────────────
document.addEventListener('click', e => {
  const actionBtn = e.target.closest('[data-qaction]');
  if (actionBtn) {
    const { qaction, jobId } = actionBtn.dataset;
    if (qaction === 'cancel') cancelConvert(jobId);
    if (qaction === 'remove') removeQueuedJob(jobId);
    if (qaction === 'clear-done') clearFinishedJobs();
  }

  if (e.target.id === 'cfg-modal') closeCfg();

  const panel = qs('#queue-panel');
  const queueBtn = qs('#queue-btn');
  if (!panel.classList.contains('hidden') && !panel.contains(e.target) && !queueBtn.contains(e.target)) {
    closeQueue();
  }
});

// ── HEADER HEIGHT → CSS VAR (keeps chips sticky below header) ──
function syncHdrHeight() {
  const h = document.querySelector('header').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--hdr-h', h + 'px');
}

// ── SEARCH ───────────────────────────────────────────────
// ROMs tab: hit the server with ?search= (paginated, capped at SEARCH_CAP).
// Saves tab: stays client-side (the full saves list is small).
// 240ms debounce is a good sweet spot on mobile — responsive without firing
// a request per keystroke. AbortController inside runSearch() cancels any
// in-flight request when a newer one supersedes it.
let _st;
function handleSearchInput(raw) {
  const q = (raw || '').trim();
  S.q = q.toLowerCase();
  if (S.tab === 'saves') {
    renderSaves();
    return;
  }
  // ROMs tab.
  if (!q) {
    if (S.searchAbort) { S.searchAbort.abort(); S.searchAbort = null; }
    // If the user was drilled into a system, stay there on clear; else overview.
    if (S.currentSystem) openSystem(S.currentSystem);
    else                 renderOverview();
    return;
  }
  runSearch(q);
}

document.addEventListener('DOMContentLoaded', () => {
  syncHdrHeight();
  window.addEventListener('resize', syncHdrHeight);

  // Hide settings button for non-admin users
  if (!IS_ADMIN) qs('#settings-btn').style.display = 'none';

  qs('#search').addEventListener('input', e => {
    clearTimeout(_st);
    _st = setTimeout(() => handleSearchInput(e.target.value), 240);
  });
  renderQueue();
  loadLanding();
});
</script>
</body>
